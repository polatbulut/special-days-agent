<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pipeline backbone · special-days-agent</title>
<style>
  :root{
    --bg:#faf9f5; --card:#ffffff; --text-primary:#1f1e1c; --text-secondary:#6b6a64;
    --border:rgba(0,0,0,0.12); --line:#8a8980; --line-faint:rgba(0,0,0,0.30);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#1a1916; --card:#222019; --text-primary:#ECEAE2; --text-secondary:#B4B2A9;
      --border:rgba(255,255,255,0.14); --line:#9a988f; --line-faint:rgba(255,255,255,0.30);
    }
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text-primary);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.7;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:880px;margin:0 auto;padding:40px 24px 64px;}
  a.back{font-size:13px;color:var(--text-secondary);text-decoration:none;}
  a.back:hover{color:var(--text-primary);}
  h1{font-size:22px;font-weight:500;margin:18px 0 8px;}
  p.lead{font-size:16px;color:var(--text-secondary);margin:0 0 28px;max-width:700px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;}
  svg{width:100%;height:auto;display:block;}
  footer{margin-top:28px;font-size:13px;color:var(--text-secondary);}
  text.t{font-size:14px;font-weight:400;fill:var(--text-primary);}
  text.th{font-size:14px;font-weight:500;fill:var(--text-primary);}
  text.ts{font-size:12px;font-weight:400;fill:var(--text-secondary);}
  .arr{fill:none;stroke:var(--line);stroke-width:1.5;}
  .leader{fill:none;stroke:var(--line-faint);stroke-width:0.6;stroke-dasharray:3 3;}
  .node{transition:opacity .15s ease;}
  .node:hover{opacity:.82;}
  marker path{stroke:var(--line);}
  .c-gray>rect,rect.c-gray{fill:#F1EFE8;stroke:#5F5E5A;}
  .c-gray>.th,.c-gray>.t{fill:#444441;} .c-gray>.ts{fill:#5F5E5A;}
  .c-pink>rect,rect.c-pink{fill:#FBEAF0;stroke:#993556;}
  .c-pink>.th,.c-pink>.t{fill:#72243E;} .c-pink>.ts{fill:#993556;}
  .c-teal>rect,rect.c-teal{fill:#E1F5EE;stroke:#0F6E56;}
  .c-teal>.th,.c-teal>.t{fill:#085041;} .c-teal>.ts{fill:#0F6E56;}
  .c-coral>rect,rect.c-coral{fill:#FAECE7;stroke:#993C1D;}
  .c-coral>.th,.c-coral>.t{fill:#712B13;} .c-coral>.ts{fill:#993C1D;}
  .c-purple>rect,rect.c-purple{fill:#EEEDFE;stroke:#534AB7;}
  .c-purple>.th,.c-purple>.t{fill:#3C3489;} .c-purple>.ts{fill:#534AB7;}
  @media (prefers-color-scheme:dark){
    .c-gray>rect,rect.c-gray{fill:#3a3936;stroke:#B4B2A9;}
    .c-gray>.th,.c-gray>.t{fill:#D3D1C7;} .c-gray>.ts{fill:#B4B2A9;}
    .c-pink>rect,rect.c-pink{fill:#72243E;stroke:#ED93B1;}
    .c-pink>.th,.c-pink>.t{fill:#F4C0D1;} .c-pink>.ts{fill:#ED93B1;}
    .c-teal>rect,rect.c-teal{fill:#085041;stroke:#5DCAA5;}
    .c-teal>.th,.c-teal>.t{fill:#9FE1CB;} .c-teal>.ts{fill:#5DCAA5;}
    .c-coral>rect,rect.c-coral{fill:#712B13;stroke:#F0997B;}
    .c-coral>.th,.c-coral>.t{fill:#F5C4B3;} .c-coral>.ts{fill:#F0997B;}
    .c-purple>rect,rect.c-purple{fill:#3C3489;stroke:#AFA9EC;}
    .c-purple>.th,.c-purple>.t{fill:#CECBF6;} .c-purple>.ts{fill:#AFA9EC;}
  }
</style>
</head>

<div class="wrap">

  <h1>1 · Pipeline backbone</h1>
  <p class="lead">Every run is the same four-stage spine — collect, filter, enrich, output — and one canonical <code>SpecialDate</code> record rides through all of it, de-duplicated and sorted by date.</p>

<g class="node c-gray">
 <rect x="40" y="160" width="600" height="56" rx="8" stroke-width="0.5"/>
 <text class="th" x="340" y="180" text-anchor="middle" dominant-baseline="central">SpecialDate</text>
 <text class="ts" x="340" y="200" text-anchor="middle" dominant-baseline="central">one frozen record per row, de-duplicated and sorted by date</text>
</g>
</svg>

</div>
